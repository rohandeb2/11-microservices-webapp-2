#A ServiceAccount is like an identity for pods.
# We use a ServiceAccount in Kubernetes to give pods an identity and permissions.
# Just like users need accounts to access systems, pods also need an identity to access APIs or external services.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: boutique-admin-sa
  namespace: boutique-app
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::889501007925:role/boutique-microservice-sa
automountServiceAccountToken: true

# annotations:
#   eks.amazonaws.com/role-arn: arn:aws:iam::889501007925:role/boutique-microservice-sa

# This connects the ServiceAccount with an IAM role in Amazon Web Services.
# This feature is called IAM Roles for Service Accounts (IRSA) in Amazon EKS.

# Meaning:
# Pod → ServiceAccount → IAM Role → AWS services
# Pods using this ServiceAccount can only perform the actions allowed in that IAM role.



#automountServiceAccountToken: true
# This tells Kubernetes:
# Automatically mount the ServiceAccount authentication token inside the pod.
# The token allows the pod to:
# authenticate with the Kubernetes API server
# use the IAM role in AWS