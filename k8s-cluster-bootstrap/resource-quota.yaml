# ResourceQuota = limits the total resources a namespace can use.

apiVersion: v1 #Using the core Kubernetes API version
kind: ResourceQuota
metadata:
  name: boutique-app-quota
  namespace: boutique-app
spec:             #Inside spec.hard we define the maximum allowed resources.
  hard:
    requests.cpu: "6"   #Total guaranteed CPU across all pods can be 6 cores
    limits.cpu: "10"     #Pods can use up to 10 cores maximum
    requests.memory: 16Gi  #16 GB reserved memory
    limits.memory: 20Gi    #20 GB maximum memory
    pods: "40"             # Maximum 40 pods allowed in this namespace.
    services: "15"         # Maximum 15 services allowed.
    configmaps: "20"       #Maximum 20 ConfigMaps.
    secrets: "100"         #Maximum 100 Secrets.
    persistentvolumeclaims: "5"   #Maximum 5 PVCs allowed.
    requests.storage: 20Gi        #Total storage allowed = 20 GB


#This ResourceQuota ensures that the boutique-app namespace cannot use more than the 
#defined CPU, memory, pods, services, and storage, preventing it from overloading the Kubernetes cluster.