apiVersion: v1
kind: ResourceQuota
metadata:
  name: boutique-app-quota
  namespace: boutique-app
spec:
  hard:
    # --- Compute Budget ---
    # Total CPU across all 11 services. 
    # Based on your env-values, 6 cores allows for scaling bursts.
    requests.cpu: "6"
    limits.cpu: "10"
    
    # --- Memory Budget ---
    # Total RAM. 12Gi covers your Java (Ad) and .NET (Cart) needs.
    requests.memory: 12Gi
    limits.memory: 16Gi

    # --- Object Limits ---
    # Prevents "Object Sprawl" (e.g., a bug creating 10,000 ConfigMaps)
    pods: "40"             # Max pods (11 services * 3 replicas + overhead)
    services: "15"         # You have 11 services
    configmaps: "20"
    secrets: "20"
    persistentvolumeclaims: "0" # As a CEO, you prefer stateless Fargate