apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-scaler-sa
  namespace: logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-scaler-role
  namespace: default # The namespace where your frontend is running
rules:
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "deployments"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-scaler-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: ai-scaler-sa
    namespace: logging
roleRef:
  kind: Role
  name: deployment-scaler-role
  apiGroup: rbac.authorization.k8s.io