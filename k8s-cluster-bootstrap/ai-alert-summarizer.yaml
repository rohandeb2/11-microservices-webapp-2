# --- k8s/ai-alert-external-secret.yaml ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-log-analyzer-secret
  namespace: logging # Ensure this matches your deployment namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: ai-log-analyzer-secret
data:
  - secretKey: AI_LOG_ANALYZER_KEY
    remoteRef:
      key: ai/boutique-app/dev/log-analyzer # Matches your new TF name
      property: AI_LOG_ANALYZER_KEY
  - secretKey: SLACK_WEBHOOK_URL
    remoteRef:
      key: ai/boutique-app/dev/log-analyzer
      property: SLACK_WEBHOOK_URL 