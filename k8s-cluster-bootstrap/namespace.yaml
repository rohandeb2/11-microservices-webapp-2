apiVersion: v1 #Using the core Kubernetes API version
kind: Namespace
metadata:
  name: boutique-app
  labels:
    name: boutique-app
    env: production
    team: online-boutique-core
    monitoring: enabled
    istio-injection: disabled
    app.kubernetes.io/part-of: online-boutique
    app.kubernetes.io/managed-by: helm

#Labels in Kubernetes namespaces are used for organization, automation, filtering, and policy management. They are not required for Kubernetes to work, but they are a production best practice for managing large-scale systems.