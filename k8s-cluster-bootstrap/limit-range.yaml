#LimitRange = sets minimum, maximum, and default resource limits for containers in a namespace.

apiVersion: v1
kind: LimitRange
metadata:
  name: boutique-app-limits
  namespace: boutique-app
spec:
  limits:
  - default:                # Default LIMITS if not specified
      cpu: 500m
      memory: 512Mi
    defaultRequest:         # Default REQUESTS if not specified
      cpu: 100m
      memory: 128Mi
    max:                    # Maximum allowed for ANY single container
      cpu: "2"
      memory: 2Gi
    min:                    
      cpu: 10m            #millicore -> 1000m = 1 CPU core
      memory: 64Mi        #Mebibyte --> 1Mi = 1 MB
    type: Container #This rule applies to individual containers inside pods.