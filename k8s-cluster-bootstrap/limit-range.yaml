apiVersion: v1
kind: LimitRange
metadata:
  name: boutique-app-limits
  namespace: boutique-app
spec:
  limits:
  - default:                # Default LIMITS if not specified
      cpu: 500m
      memory: 512Mi
    defaultRequest:         # Default REQUESTS if not specified
      cpu: 100m
      memory: 128Mi
    max:                    # Maximum allowed for ANY single container
      cpu: "2"
      memory: 2Gi
    min:                    # Minimum allowed for ANY single container
      cpu: 10m
      memory: 64Mi
    type: Container