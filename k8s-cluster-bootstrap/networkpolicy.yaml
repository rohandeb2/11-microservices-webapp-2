# --- 1. Default Deny All Traffic ---
apiVersion: networking.k8s.io/v1  
#Use the networking API version v1 to understand and process this resource
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: boutique-app
spec:
  podSelector: {} #{} means select all pods in this namespace.
  policyTypes:
  - Ingress #controls incoming traffic to pods
  - Egress  #controls outgoing traffic from pods
            #🚨 Because no rules are defined, Kubernetes blocks everything.

---
# --- 2. Allow DNS Resolution (CoreDNS in kube-system) ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: boutique-app
spec:
  podSelector: {}
  policyTypes:
  - Egress   #This policy only controls outgoing traffic.
  egress:    #Defines allowed outgoing traffic.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system #Allow traffic to kube-system namespace.This is where **CoreDNS runs.
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

---
# --- 3. Allow External Traffic to Frontend (via AWS Load Balancer) ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: boutique-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend #This policy applies only to frontend pods.
  policyTypes:
  - Ingress        #Controls incoming traffic only
  ingress:
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0
    ports:
    - protocol: TCP
      port: 8080

---
# --- 4. Allow Internal Communication Between Microservices ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: boutique-app
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

  ingress:
  - from:
    - podSelector: {}  #Pods inside boutique-app can communicate with each other.

  egress:
  - to:
    - podSelector: {} #Pods can send traffic to any other pod in the namespace.
    
# We created 4 NetworkPolicies to:

# 1️⃣ Block all traffic by default
# 2️⃣ Allow DNS resolution  -->Without this, pods can't resolve service names like "cartservice" or "rediscart"
# 3️⃣ Allow external users to access the frontend #-->Without this, the AWS Load Balancer cannot route traffic to the frontend pods.
# 4️⃣ Allow internal communication between microservices 
















