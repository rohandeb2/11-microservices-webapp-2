# --- 1. The Global Lock (Security First) ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: boutique-app
spec:
  podSelector: {} # Selects all pods
  policyTypes:
  - Ingress
  - Egress
---
# --- 2. The DNS Lifeline (Crucial!) ---
# Without this, pods cannot resolve "cartservice" or "rediscart" names.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: boutique-app
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
---
# --- 3. The "Front Door" Access ---
# Allows the AWS Load Balancer to talk to the Frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: boutique-app
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0 # Open to the ALB
    ports:
    - protocol: TCP
      port: 8080