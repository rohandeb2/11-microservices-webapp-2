# --- The Connection Bridge ---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: boutique-app
  labels:
    app.kubernetes.io/managed-by: external-secrets
    security.boutique.com/tier: internal
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        # Best Practice: Use IRSA (IAM Roles for Service Accounts)
        jwt:
          serviceAccountRef:
            name: boutique-admin-sa
---
# --- The Automated Sync Request ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: boutique-db-secrets
  namespace: boutique-app
  labels:
    app.kubernetes.io/name: online-boutique
    security.boutique.com/sensitive: "true"
spec:
  # Professional sync interval (1h is standard to minimize AWS API costs)
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: boutique-app-secret # The final K8s Secret name
    creationPolicy: Owner
    # Ensures the K8s secret is deleted if the AWS secret is removed
    deletionPolicy: Retain 
  data:
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: boutique/production/redis
      property: password
  
  # --- Enterprise Retry Strategy ---
  # If AWS is down, the operator will retry with exponential backoff
  retryStrategy:
    standard:
      maxRetries: 5
      interval: 10s