# --- The Connection Bridge ---
apiVersion: external-secrets.io/v1beta1 #Uses the External Secrets Operator API.
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: boutique-app
  labels:
    app.kubernetes.io/managed-by: external-secrets
    security.boutique.com/tier: internal #Custom label used for security classification.
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: boutique-admin-sa 
---
#Fetch a secret from AWS and create a Kubernetes Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: boutique-db-secrets
  namespace: boutique-app
  labels:
    app.kubernetes.io/name: online-boutique
    security.boutique.com/sensitive: "true" #Marks this as sensitive data.
spec:
  refreshInterval: 1h #External Secrets will sync secrets every 1 hour.
  secretStoreRef:    #This tells External Secrets: Use the SecretStore we created above to fetch secrets.
    name: aws-secrets-store
    kind: SecretStore
  target:    #This will create a Kubernetes Secret called:boutique-app-secret
    name: boutique-app-secret
    creationPolicy: Owner   #External Secrets controls this secret.
    deletionPolicy: Retain   #Even if the ExternalSecret is deleted, the Kubernetes Secret will remain.
  data:       #Defines which secret to fetch.
  - secretKey: REDIS_PASSWORD
    remoteRef:    #Fetch the secret from an external system.
      key: boutique-app-app-secrets-dev   #Secret name in AWS Secrets Manager.
      property: REDIS_PASSWORD
    #property tells External Secrets: "Fetch only this specific field."
