# --- The Connection Bridge ---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secrets-store
  namespace: boutique-app
  labels:
    app.kubernetes.io/managed-by: external-secrets
    security.boutique.com/tier: internal
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            # CEO NOTE: Ensure this matches the ServiceAccount name in your values.yaml
            name: boutique-admin-sa 
---
# --- The Automated Sync Request ---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: boutique-db-secrets
  namespace: boutique-app
  labels:
    app.kubernetes.io/name: online-boutique
    security.boutique.com/sensitive: "true"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: SecretStore
  target:
    name: boutique-app-secret
    creationPolicy: Owner
    deletionPolicy: Retain 
  data:
  - secretKey: REDIS_PASSWORD
    remoteRef:
      key: boutique-app-app-secrets-dev
      property: REDIS_PASSWORD
  
  # CEO's Final Correction: The v1 API does not use a top-level retrySettings field.
  # For the 12 LPA standard, we rely on the Operator's default exponential backoff 
  # or define it within the SecretStore provider spec if needed.