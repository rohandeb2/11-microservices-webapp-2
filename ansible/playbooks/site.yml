# ansible/playbooks/site.yml
---
# ============================================================
# Master Playbook: Bootstrap entire Online Boutique platform
# Usage: ansible-playbook playbooks/site.yml
# ============================================================

- name: "Phase 1: Bootstrap EKS cluster tools"
  hosts: localhost
  gather_facts: false
  roles:
    - role: eks-bootstrap
      tags: [bootstrap, always]

- name: "Phase 2: Install AWS Load Balancer Controller"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Install AWS LBC via Helm
      kubernetes.core.helm:
        name: aws-load-balancer-controller
        chart_ref: eks/aws-load-balancer-controller
        release_namespace: kube-system
        values:
          clusterName: "{{ eks_cluster_name }}"
          serviceAccount:
            create: true
            annotations:
              eks.amazonaws.com/role-arn: "arn:aws:iam::{{ aws_account_id }}:role/AmazonEKSLoadBalancerControllerRole"
      tags: [lbc]

- name: "Phase 3: Install External Secrets Operator"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Install External Secrets via Helm
      kubernetes.core.helm:
        name: external-secrets
        chart_ref: external-secrets/external-secrets
        release_namespace: external-secrets
        create_namespace: true
        chart_version: "{{ external_secrets_version }}"
      tags: [eso]

- name: "Phase 4: Install ArgoCD and bootstrap GitOps"
  hosts: localhost
  gather_facts: false
  roles:
    - role: argocd
      tags: [argocd, gitops]

- name: "Phase 5: Deploy ELK Stack"
  hosts: localhost
  gather_facts: false
  roles:
    - role: elk
      tags: [elk, logging]

- name: "Phase 6: Print Summary"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: "Cluster Bootstrap Complete"
      debug:
        msg:
          - "==========================================="
          - "Online Boutique Platform Bootstrap Complete"
          - "==========================================="
          - "ArgoCD:  https://argocd.{{ domain_name }}"
          - "Kibana:  https://kibana.{{ domain_name }}"
          - "Grafana: https://grafana.{{ domain_name }}"
          - "App:     https://boutique.{{ domain_name }}"
          - "==========================================="