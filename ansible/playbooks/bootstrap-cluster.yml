---
# ============================================================
# Playbook: bootstrap-cluster.yml
# Purpose: One-time setup of the EKS cluster after Terraform
#          provisions the infrastructure. This installs and
#          configures all platform-level tools.
#
# Usage:
#   ansible-playbook playbooks/bootstrap-cluster.yml
#   ansible-playbook playbooks/bootstrap-cluster.yml --tags argocd
#   ansible-playbook playbooks/bootstrap-cluster.yml --tags elk
#
# Prerequisites:
#   - AWS CLI configured with correct IAM permissions
#   - Terraform has already been applied (EKS cluster exists)
#   - pip install ansible kubernetes openshift boto3
#   - ansible-galaxy collection install kubernetes.core amazon.aws
# ============================================================

# ─────────────────────────────────────────────────────────────
# PHASE 1: Verify environment and configure kubectl
# ─────────────────────────────────────────────────────────────
- name: "Phase 1 | Preflight Checks and Cluster Access"
  hosts: localhost
  gather_facts: false
  tags: [always, bootstrap]

  tasks:
    - name: "[Preflight] Check that required tools are installed"
      shell: "{{ item }} --version"
      loop:
        - kubectl
        - helm
        - aws
      register: tool_check
      changed_when: false
      failed_when: tool_check.rc != 0

    - name: "[Preflight] Verify AWS identity"
      shell: aws sts get-caller-identity --output table
      register: aws_identity
      changed_when: false

    - name: "[Preflight] Print AWS identity"
      debug:
        msg: "{{ aws_identity.stdout_lines }}"

    - name: "[Preflight] Update kubeconfig for EKS cluster"
      shell: |
        aws eks update-kubeconfig \
          --name {{ eks_cluster_name }} \
          --region {{ aws_region }} \
          --alias {{ eks_cluster_name }}
      changed_when: true

    - name: "[Preflight] Verify kubectl can reach the cluster"
      shell: kubectl get nodes -o wide
      register: nodes_output
      changed_when: false
      retries: 5
      delay: 15
      until: nodes_output.rc == 0

    - name: "[Preflight] Print cluster nodes"
      debug:
        msg: "{{ nodes_output.stdout_lines }}"

    - name: "[Preflight] Check Fargate profile is ACTIVE"
      shell: |
        aws eks describe-fargate-profile \
          --cluster-name {{ eks_cluster_name }} \
          --fargate-profile-name {{ eks_cluster_name }}-fargate-profile \
          --region {{ aws_region }} \
          --query 'fargateProfile.status' \
          --output text
      register: fargate_status
      changed_when: false
      failed_when: fargate_status.stdout != "ACTIVE"

    - name: "[Preflight] Fargate profile status"
      debug:
        msg: "Fargate Profile Status: {{ fargate_status.stdout }}"

# ─────────────────────────────────────────────────────────────
# PHASE 2: Create core namespaces and add Helm repos
# ─────────────────────────────────────────────────────────────
- name: "Phase 2 | Create Namespaces and Add Helm Repositories"
  hosts: localhost
  gather_facts: false
  tags: [bootstrap, namespaces]

  tasks:
    - name: "[Namespaces] Create all platform namespaces"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: "{{ item.name }}"
            labels:
              name: "{{ item.name }}"
              env: "{{ environment }}"
              managed-by: ansible
              team: "{{ item.team }}"
      loop:
        - { name: "boutique-app",     team: "online-boutique-core" }
        - { name: "argocd",           team: "platform-engineering" }
        - { name: "monitoring",       team: "platform-engineering" }
        - { name: "logging",          team: "platform-engineering" }
        - { name: "external-secrets", team: "platform-engineering" }
        - { name: "kube-system",      team: "platform-engineering" }

    - name: "[Helm] Add all required Helm repositories"
      kubernetes.core.helm_repository:
        name: "{{ item.name }}"
        repo_url: "{{ item.url }}"
      loop:
        - { name: "argo",                 url: "https://argoproj.github.io/argo-helm" }
        - { name: "prometheus-community", url: "https://prometheus-community.github.io/helm-charts" }
        - { name: "eks",                  url: "https://aws.github.io/eks-charts" }
        - { name: "external-secrets",     url: "https://charts.external-secrets.io" }
        - { name: "grafana",              url: "https://grafana.github.io/helm-charts" }

    - name: "[Helm] Update all repositories"
      shell: helm repo update
      changed_when: true

    - name: "[Helm] Verify repos were added"
      shell: helm repo list
      register: helm_repos
      changed_when: false

    - name: "[Helm] Print repo list"
      debug:
        msg: "{{ helm_repos.stdout_lines }}"

# ─────────────────────────────────────────────────────────────
# PHASE 3: Install AWS Load Balancer Controller
#          (Required BEFORE ArgoCD/Ingress can work)
# ─────────────────────────────────────────────────────────────
- name: "Phase 3 | Install AWS Load Balancer Controller"
  hosts: localhost
  gather_facts: false
  tags: [bootstrap, lbc, ingress]

  tasks:
    - name: "[LBC] Install CRDs for AWS Load Balancer Controller"
      shell: |
        kubectl apply -k \
          "github.com/aws/eks-charts/stable/aws-load-balancer-controller/crds?ref=master"
      changed_when: true
      # Ignore if CRDs already exist
      failed_when: false

    - name: "[LBC] Install AWS Load Balancer Controller via Helm"
      kubernetes.core.helm:
        name: aws-load-balancer-controller
        chart_ref: eks/aws-load-balancer-controller
        release_namespace: kube-system
        wait: true
        wait_timeout: 300
        values:
          clusterName: "{{ eks_cluster_name }}"
          region: "{{ aws_region }}"
          vpcId: "{{ vpc_id | default('') }}"
          serviceAccount:
            create: true
            name: aws-load-balancer-controller
            annotations:
              eks.amazonaws.com/role-arn: "arn:aws:iam::{{ aws_account_id }}:role/AmazonEKSLoadBalancerControllerRole"
          replicaCount: 2
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

    - name: "[LBC] Wait for LBC pods to be running"
      shell: |
        kubectl rollout status deployment/aws-load-balancer-controller \
          -n kube-system --timeout=180s
      changed_when: false
      register: lbc_status

    - name: "[LBC] Confirm LBC is running"
      debug:
        msg: "{{ lbc_status.stdout }}"

# ─────────────────────────────────────────────────────────────
# PHASE 4: Install External Secrets Operator
#          (Required BEFORE app pods start — they need secrets)
# ─────────────────────────────────────────────────────────────
- name: "Phase 4 | Install External Secrets Operator"
  hosts: localhost
  gather_facts: false
  tags: [bootstrap, eso, secrets]

  tasks:
    - name: "[ESO] Install External Secrets Operator via Helm"
      kubernetes.core.helm:
        name: external-secrets
        chart_ref: external-secrets/external-secrets
        release_namespace: external-secrets
        create_namespace: true
        chart_version: "{{ external_secrets_version }}"
        wait: true
        wait_timeout: 180
        values:
          installCRDs: true
          serviceAccount:
            annotations:
              eks.amazonaws.com/role-arn: "arn:aws:iam::{{ aws_account_id }}:role/boutique-app-microservice-role"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

    - name: "[ESO] Wait for ESO webhook to be ready"
      shell: |
        kubectl rollout status deployment/external-secrets-webhook \
          -n external-secrets --timeout=120s
      changed_when: false

    - name: "[ESO] Apply SecretStore for boutique-app"
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-cluster-bootstrap/secret-externel-secret.yaml"

    - name: "[ESO] Confirm SecretStore status"
      shell: kubectl get secretstore -n boutique-app
      register: secretstore_status
      changed_when: false

    - name: "[ESO] Print SecretStore status"
      debug:
        msg: "{{ secretstore_status.stdout_lines }}"

# ─────────────────────────────────────────────────────────────
# PHASE 5: Install ArgoCD
# ─────────────────────────────────────────────────────────────
- name: "Phase 5 | Install and Configure ArgoCD"
  hosts: localhost
  gather_facts: false
  tags: [argocd, gitops]

  tasks:
    - name: "[ArgoCD] Install ArgoCD via Helm"
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        release_namespace: argocd
        create_namespace: false
        chart_version: "5.51.6"
        wait: true
        wait_timeout: 300
        values:
          global:
            logging:
              level: info
          server:
            # Disable TLS internally — ALB handles TLS termination
            extraArgs:
              - --insecure
            ingress:
              enabled: true
              ingressClassName: alb
              annotations:
                alb.ingress.kubernetes.io/scheme: internet-facing
                alb.ingress.kubernetes.io/target-type: ip
                alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
                alb.ingress.kubernetes.io/ssl-redirect: '443'
                alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:{{ aws_region }}:{{ aws_account_id }}:certificate/your-cert-id"
                alb.ingress.kubernetes.io/group.name: "boutique-group"
              hosts:
                - "argocd.{{ domain_name }}"
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
          repoServer:
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
          applicationSet:
            enabled: true
          notifications:
            enabled: true

    - name: "[ArgoCD] Wait for ArgoCD server deployment"
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: argocd
        name: argocd-server
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 300

    - name: "[ArgoCD] Apply AppProject (online-boutique governance)"
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../argocd/projects/boutique-project.yaml"

    - name: "[ArgoCD] Bootstrap App-of-Apps (root application)"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: root-app
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: online-boutique
            source:
              repoURL: "https://github.com/rohandeb2/11-microservices-webapp-2.git"
              targetRevision: HEAD
              path: argocd/apps
            destination:
              server: https://kubernetes.default.svc
              namespace: argocd
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true

    - name: "[ArgoCD] Retrieve initial admin password"
      shell: |
        kubectl -n argocd get secret argocd-initial-admin-secret \
          -o jsonpath="{.data.password}" | base64 -d
      register: argocd_password
      changed_when: false

    - name: "[ArgoCD] Print access credentials"
      debug:
        msg:
          - "============================================"
          - "ArgoCD URL : https://argocd.{{ domain_name }}"
          - "Username   : admin"
          - "Password   : {{ argocd_password.stdout }}"
          - "============================================"
          - "IMPORTANT: Change the password after first login!"

# ─────────────────────────────────────────────────────────────
# PHASE 6: Apply Kubernetes cluster baseline
#          (RBAC, NetworkPolicies, ResourceQuota, LimitRange)
# ─────────────────────────────────────────────────────────────
- name: "Phase 6 | Apply Cluster Baseline Security and Policies"
  hosts: localhost
  gather_facts: false
  tags: [bootstrap, baseline, security]

  tasks:
    - name: "[Baseline] Apply ServiceAccount for boutique-app"
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-cluster-bootstrap/serviceaccount.yaml"

    - name: "[Baseline] Apply RBAC (Role + RoleBinding)"
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-cluster-bootstrap/rbac.yaml"

    - name: "[Baseline] Apply ClusterRole for monitoring"
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-cluster-bootstrap/cluster-role.yaml"

    - name: "[Baseline] Apply ResourceQuota"
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-cluster-bootstrap/resource-quota.yaml"

    - name: "[Baseline] Apply LimitRange"
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-cluster-bootstrap/limit-range.yaml"

    - name: "[Baseline] Apply NetworkPolicies"
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-cluster-bootstrap/networkpolicy.yaml"

    - name: "[Baseline] Verify namespace has policies applied"
      shell: |
        echo "=== ResourceQuota ===" && kubectl get resourcequota -n boutique-app
        echo "=== LimitRange ===" && kubectl get limitrange -n boutique-app
        echo "=== NetworkPolicies ===" && kubectl get networkpolicy -n boutique-app
        echo "=== RBAC ===" && kubectl get role,rolebinding -n boutique-app
      register: baseline_check
      changed_when: false

    - name: "[Baseline] Print baseline status"
      debug:
        msg: "{{ baseline_check.stdout_lines }}"

# ─────────────────────────────────────────────────────────────
# PHASE 7: Final summary
# ─────────────────────────────────────────────────────────────
- name: "Phase 7 | Bootstrap Complete — Print Platform Summary"
  hosts: localhost
  gather_facts: false
  tags: [always]

  tasks:
    - name: "[Summary] Get all running pods across namespaces"
      shell: kubectl get pods -A --field-selector=status.phase=Running | grep -v "Completed"
      register: all_pods
      changed_when: false

    - name: "[Summary] Print all running pods"
      debug:
        msg: "{{ all_pods.stdout_lines }}"

    - name: "[Summary] Platform bootstrap complete"
      debug:
        msg:
          - "╔══════════════════════════════════════════════════╗"
          - "║   Online Boutique Platform Bootstrap COMPLETE    ║"
          - "╠══════════════════════════════════════════════════╣"
          - "║  ArgoCD  : https://argocd.{{ domain_name }}      "
          - "║  App     : https://boutique.{{ domain_name }}    "
          - "╠══════════════════════════════════════════════════╣"
          - "║  Next Steps:                                     ║"
          - "║  1. Run deploy-monitoring.yml for Prometheus     ║"
          - "║  2. Run deploy-elk.yml for ELK stack             ║"
          - "║  3. ArgoCD will auto-sync all 11 microservices   ║"
          - "╚══════════════════════════════════════════════════╝"