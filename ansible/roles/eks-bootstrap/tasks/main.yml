---
# tasks file for eks-bootstrap
# ansible/roles/eks-bootstrap/tasks/main.yml
---
- name: "[Bootstrap] Update kubeconfig for EKS cluster"
  shell: |
    aws eks update-kubeconfig \
      --name {{ eks_cluster_name }} \
      --region {{ aws_region }}
  changed_when: true

- name: "[Bootstrap] Verify cluster connection"
  shell: kubectl cluster-info
  register: cluster_info
  changed_when: false

- name: "[Bootstrap] Display cluster info"
  debug:
    msg: "{{ cluster_info.stdout_lines }}"

- name: "[Bootstrap] Create all required namespaces"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
        labels:
          managed-by: ansible
  loop: "{{ namespaces }}"

- name: "[Bootstrap] Add Helm repositories"
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
  loop:
    - { name: "argo",               url: "https://argoproj.github.io/argo-helm" }
    - { name: "prometheus-community", url: "https://prometheus-community.github.io/helm-charts" }
    - { name: "aws-ebs-csi-driver", url: "https://kubernetes-sigs.github.io/aws-ebs-csi-driver" }
    - { name: "external-secrets",   url: "https://charts.external-secrets.io" }

- name: "[Bootstrap] Update Helm repos"
  shell: helm repo update
  changed_when: true