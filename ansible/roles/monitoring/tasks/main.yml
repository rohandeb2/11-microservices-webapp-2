---
# ============================================================
# Role: monitoring
# File: roles/monitoring/tasks/main.yml
# Purpose: Install and configure Prometheus + Grafana on EKS
#          using the kube-prometheus-stack Helm chart.
#          Also wires up Grafana dashboards for all 11 services.
#
# Called from: playbooks/site.yml or deploy-monitoring.yml
# Tags: monitoring, prometheus, grafana, alertmanager
# ============================================================

# ─────────────────────────────────────────────────────────────
# SECTION 1: Pre-checks
# ─────────────────────────────────────────────────────────────

- name: "[Monitoring] Verify monitoring namespace exists"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring
        labels:
          name: monitoring
          env: "{{ environment }}"
          managed-by: ansible
          team: platform-engineering
  tags: [monitoring, prometheus, grafana]

- name: "[Monitoring] Confirm prometheus-community repo is available"
  shell: helm repo list | grep prometheus-community
  register: repo_check
  changed_when: false
  failed_when: repo_check.rc != 0
  tags: [monitoring]

# ─────────────────────────────────────────────────────────────
# SECTION 2: Create Grafana credentials secret
#            (Better than hardcoding password in values)
# ─────────────────────────────────────────────────────────────

- name: "[Grafana] Create Grafana admin credentials secret"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: grafana-admin-credentials
        namespace: monitoring
        labels:
          managed-by: ansible
      type: Opaque
      stringData:
        # In production, pull these from AWS Secrets Manager via lookup
        admin-user: "admin"
        admin-password: "{{ grafana_admin_password | default(lookup('env', 'GRAFANA_PASSWORD') | default('boutique-grafana-2024')) }}"
  no_log: true  # Never log secrets
  tags: [monitoring, grafana]

# ─────────────────────────────────────────────────────────────
# SECTION 3: Create Alertmanager Slack secret
# ─────────────────────────────────────────────────────────────

- name: "[Alertmanager] Create Slack webhook secret"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: alertmanager-slack-webhook
        namespace: monitoring
        labels:
          managed-by: ansible
      type: Opaque
      stringData:
        # Replace with your real Slack webhook URL
        webhook-url: "{{ slack_webhook_url | default(lookup('env', 'SLACK_WEBHOOK_URL') | default('https://hooks.slack.com/services/placeholder')) }}"
  no_log: true
  tags: [monitoring, alertmanager]

# ─────────────────────────────────────────────────────────────
# SECTION 4: Install kube-prometheus-stack
# ─────────────────────────────────────────────────────────────

- name: "[Prometheus] Install kube-prometheus-stack via Helm"
  kubernetes.core.helm:
    name: kube-prometheus-stack
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    create_namespace: false
    chart_version: "{{ prometheus_stack_version | default('45.0.0') }}"
    wait: true
    wait_timeout: 600  # Prometheus stack takes time on first install
    values:
      # ── Global ───────────────────────────────────────────
      fullnameOverride: "kube-prometheus-stack"

      # ── Prometheus ───────────────────────────────────────
      prometheus:
        prometheusSpec:
          # Scrape interval: how often Prometheus collects metrics
          scrapeInterval: "30s"
          evaluationInterval: "30s"
          retention: "15d"
          retentionSize: "8GB"

          # Storage: emptyDir for Fargate (no persistent volumes on Fargate nodes)
          # For production with EBS: use storageSpec with PVC
          storageSpec:
            emptyDir:
              medium: Memory

          # IMPORTANT: This tells Prometheus to watch ALL namespaces for
          # ServiceMonitor resources, not just its own namespace
          serviceMonitorSelectorNilUsesHelmValues: false
          podMonitorSelectorNilUsesHelmValues: false
          ruleSelectorNilUsesHelmValues: false

          resources:
            requests:
              cpu: 200m
              memory: 400Mi
            limits:
              cpu: 500m
              memory: 1Gi

          # Add boutique-app as a target namespace for service discovery
          additionalScrapeConfigs:
            - job_name: "boutique-microservices"
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - boutique-app
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: kubernetes_namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: kubernetes_pod_name

      # ── Fargate Compatibility ────────────────────────────
      # node-exporter runs as DaemonSet — not supported on Fargate
      nodeExporter:
        enabled: false
      prometheus-node-exporter:
        enabled: false

      # kube-state-metrics works fine on Fargate
      kubeStateMetrics:
        enabled: true

      # ── Grafana ──────────────────────────────────────────
      grafana:
        enabled: true
        replicas: 1

        # Reference the secret we created above
        admin:
          existingSecret: grafana-admin-credentials
          userKey: admin-user
          passwordKey: admin-password

        # Persistence: off for Fargate (dashboards defined as code below)
        persistence:
          enabled: false

        # Pre-load dashboards via ConfigMap
        # These will appear automatically in Grafana under "Boutique" folder
        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: boutique-dashboards
                orgId: 1
                folder: "Online Boutique"
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/boutique

        # Pre-configured dashboards imported from Grafana.com by ID
        dashboards:
          boutique:
            kubernetes-cluster-overview:
              gnetId: 7249         # Kubernetes Cluster Overview
              revision: 1
              datasource: Prometheus
            pod-metrics:
              gnetId: 6417         # Kubernetes Pod metrics
              revision: 1
              datasource: Prometheus
            nginx-ingress:
              gnetId: 9614         # NGINX Ingress Controller
              revision: 1
              datasource: Prometheus

        # Expose Grafana via ALB Ingress
        ingress:
          enabled: true
          ingressClassName: alb
          annotations:
            alb.ingress.kubernetes.io/scheme: internet-facing
            alb.ingress.kubernetes.io/target-type: ip
            alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
            alb.ingress.kubernetes.io/ssl-redirect: '443'
            alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:{{ aws_region }}:{{ aws_account_id }}:certificate/your-cert-id"
            # IMPORTANT: Reuses the same ALB as ArgoCD and the app
            alb.ingress.kubernetes.io/group.name: "boutique-group"
          hosts:
            - "grafana.{{ domain_name }}"

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # Connect Grafana to Prometheus automatically
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Prometheus
                type: prometheus
                url: http://kube-prometheus-stack-prometheus:9090
                access: proxy
                isDefault: true
                editable: false
              - name: Alertmanager
                type: alertmanager
                url: http://kube-prometheus-stack-alertmanager:9093
                access: proxy
                editable: false

      # ── Alertmanager ─────────────────────────────────────
      alertmanager:
        enabled: true
        alertmanagerSpec:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        config:
          global:
            resolve_timeout: 5m
            # Slack URL pulled from the secret we created
            slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url

          route:
            group_by: ["alertname", "namespace", "service"]
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: "slack-notifications"
            routes:
              - matchers:
                  - severity = critical
                receiver: "slack-notifications"
                continue: false
              - matchers:
                  - severity = warning
                receiver: "slack-notifications"
                continue: false

          receivers:
            - name: "slack-notifications"
              slack_configs:
                - channel: "#alerts-boutique"
                  send_resolved: true
                  title: '{{ "{{" }} template "slack.default.title" . {{ "}}" }}'
                  text: >-
                    {{ "{{" }} range .Alerts {{ "}}" }}
                      *Alert:* {{ "{{" }} .Annotations.summary {{ "}}" }}
                      *Description:* {{ "{{" }} .Annotations.description {{ "}}" }}
                      *Severity:* {{ "{{" }} .Labels.severity {{ "}}" }}
                      *Namespace:* {{ "{{" }} .Labels.namespace {{ "}}" }}
                    {{ "{{" }} end {{ "}}" }}

          # Reference the Slack secret
          alertmanagerSecret:
            name: alertmanager-slack-webhook

  tags: [monitoring, prometheus, grafana, alertmanager]

# ─────────────────────────────────────────────────────────────
# SECTION 5: Wait for everything to be healthy
# ─────────────────────────────────────────────────────────────

- name: "[Prometheus] Wait for Prometheus StatefulSet to be ready"
  shell: |
    kubectl rollout status statefulset/prometheus-kube-prometheus-stack-prometheus \
      -n monitoring --timeout=300s
  register: prometheus_status
  changed_when: false
  retries: 3
  delay: 30
  until: prometheus_status.rc == 0
  tags: [monitoring, prometheus]

- name: "[Grafana] Wait for Grafana deployment to be ready"
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: monitoring
    name: kube-prometheus-stack-grafana
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 300
  tags: [monitoring, grafana]

- name: "[Alertmanager] Wait for Alertmanager StatefulSet to be ready"
  shell: |
    kubectl rollout status statefulset/alertmanager-kube-prometheus-stack-alertmanager \
      -n monitoring --timeout=180s
  changed_when: false
  tags: [monitoring, alertmanager]

# ─────────────────────────────────────────────────────────────
# SECTION 6: Apply boutique-specific PrometheusRules
#            (The alert rules from your boutique-alerts.yaml)
# ─────────────────────────────────────────────────────────────

- name: "[Alerts] Apply boutique service alert rules"
  kubernetes.core.k8s:
    state: present
    src: "{{ playbook_dir }}/../../argocd/apps/boutique-alerts.yaml"
  tags: [monitoring, alerts]

- name: "[Alerts] Apply additional custom alert rules"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: monitoring.coreos.com/v1
      kind: PrometheusRule
      metadata:
        name: boutique-custom-alerts
        namespace: monitoring
        labels:
          # This MUST match the Helm release label for Prometheus to discover it
          release: kube-prometheus-stack
      spec:
        groups:
          - name: boutique.slo
            rules:
              # Alert if any pod has been restarting more than 5 times
              - alert: PodRestartingTooOften
                expr: |
                  rate(kube_pod_container_status_restarts_total{namespace="boutique-app"}[15m]) * 60 * 15 > 5
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "Pod {{ $labels.pod }} is restarting frequently"
                  description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted more than 5 times in 15 minutes."

              # Alert if HPA has hit max replicas (signals the app needs more capacity)
              - alert: HPAAtMaxReplicas
                expr: |
                  kube_horizontalpodautoscaler_status_current_replicas{namespace="boutique-app"}
                  ==
                  kube_horizontalpodautoscaler_spec_max_replicas{namespace="boutique-app"}
                for: 10m
                labels:
                  severity: warning
                annotations:
                  summary: "HPA {{ $labels.horizontalpodautoscaler }} is at max replicas"
                  description: "HPA {{ $labels.horizontalpodautoscaler }} has been at maximum replicas for 10 minutes. Consider increasing maxReplicas."

              # Alert if memory usage exceeds 85% of limit
              - alert: ContainerMemoryNearLimit
                expr: |
                  (container_memory_working_set_bytes{namespace="boutique-app", container!=""} /
                  container_spec_memory_limit_bytes{namespace="boutique-app", container!=""}) > 0.85
                for: 5m
                labels:
                  severity: warning
                annotations:
                  summary: "Container {{ $labels.container }} memory near limit"
                  description: "Container {{ $labels.container }} in pod {{ $labels.pod }} is using more than 85% of its memory limit."
  tags: [monitoring, alerts]

# ─────────────────────────────────────────────────────────────
# SECTION 7: Verify and print summary
# ─────────────────────────────────────────────────────────────

- name: "[Verify] Check all monitoring pods are running"
  shell: kubectl get pods -n monitoring -o wide
  register: monitoring_pods
  changed_when: false
  tags: [monitoring]

- name: "[Verify] Print monitoring pods"
  debug:
    msg: "{{ monitoring_pods.stdout_lines }}"
  tags: [monitoring]

- name: "[Verify] Check PrometheusRules are loaded"
  shell: kubectl get prometheusrules -n monitoring
  register: prom_rules
  changed_when: false
  tags: [monitoring, alerts]

- name: "[Verify] Print PrometheusRules"
  debug:
    msg: "{{ prom_rules.stdout_lines }}"
  tags: [monitoring, alerts]

- name: "[Summary] Monitoring stack deployment complete"
  debug:
    msg:
      - "╔══════════════════════════════════════════════════╗"
      - "║       Monitoring Stack Deployment COMPLETE       ║"
      - "╠══════════════════════════════════════════════════╣"
      - "║  Grafana       : https://grafana.{{ domain_name }}"
      - "║  Prometheus    : Internal (port-forward to test) ║"
      - "║  Alertmanager  : Internal (port-forward to test) ║"
      - "╠══════════════════════════════════════════════════╣"
      - "║  To access Prometheus locally:                   ║"
      - "║  kubectl port-forward svc/kube-prometheus-stack- ║"
      - "║  prometheus 9090:9090 -n monitoring              ║"
      - "╚══════════════════════════════════════════════════╝"
  tags: [monitoring]