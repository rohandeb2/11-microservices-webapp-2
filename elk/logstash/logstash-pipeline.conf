input {
  beats {
    port => 5044  # Receives from Filebeat
    ssl_enabled => false  # Enable in production with certs
  }
}

filter {
  # -----------------------------------------------
  # STEP 1: Tag which microservice sent this log
  # -----------------------------------------------
  if [kubernetes][labels][app_kubernetes_io/name] {
    mutate {
      add_field => {
        "service_name" => "%{[kubernetes][labels][app_kubernetes_io/name]}"
      }
    }
  }

  # -----------------------------------------------
  # STEP 2: Parse JSON logs (Go services log in JSON)
  # frontend, checkoutservice, productcatalogservice
  # -----------------------------------------------
  if [service_name] in ["frontend", "checkoutservice", "productcatalogservice", "shippingservice"] {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
    if [parsed][severity] {
      mutate {
        add_field => { "log_level" => "%{[parsed][severity]}" }
      }
    }
  }

  # -----------------------------------------------
  # STEP 3: Parse plain-text logs (Python services)
  # emailservice, recommendationservice, loadgenerator
  # -----------------------------------------------
  if [service_name] in ["emailservice", "recommendationservice", "loadgenerator"] {
    grok {
      match => {
        "message" => "%{LOGLEVEL:log_level}:%{SPACE}%{GREEDYDATA:log_message}"
      }
    }
  }

  # -----------------------------------------------
  # STEP 4: Parse Node.js logs (currencyservice, paymentservice)
  # -----------------------------------------------
  if [service_name] in ["currencyservice", "paymentservice"] {
    grok {
      match => {
        "message" => "\[%{LOGLEVEL:log_level}\]%{SPACE}%{GREEDYDATA:log_message}"
      }
    }
  }

  # -----------------------------------------------
  # STEP 5: Flag ERROR and WARN logs for alerting
  # -----------------------------------------------
  if [log_level] in ["ERROR", "CRITICAL", "FATAL"] {
    mutate {
      add_tag => ["alert", "error"]
      add_field => { "alert_severity" => "critical" }
    }
  }

  # -----------------------------------------------
  # STEP 6: Drop health check noise (keeps storage clean)
  # -----------------------------------------------
  if [message] =~ "/_healthz" or [message] =~ "/liveness" {
    drop {}
  }

  # -----------------------------------------------
  # STEP 7: Add environment metadata
  # -----------------------------------------------
  mutate {
    add_field => {
      "environment"  => "production"
      "cluster_name" => "boutique-app-cluster"
      "project"      => "online-boutique"
    }
    remove_field => ["agent", "ecs", "input"]  # Remove noisy fields
  }
}

output {
  # Send all logs to Elasticsearch
  elasticsearch {
    hosts    => ["https://elasticsearch:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    ssl_verification_mode => "none"  # Use proper certs in production
    
    # Create separate index per service per day
    # This lets you set different retention per service
    index => "boutique-%{service_name}-%{+YYYY.MM.dd}"
  }

  # Also output errors to stdout for debugging
  if "error" in [tags] {
    stdout {
      codec => rubydebug
    }
  }
}