apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    # CEO Note: Use the AWS Load Balancer Controller
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Senior DevOps Fix: ArgoCD uses HTTPS internally; we must use SSL redirect
    alb.ingress.kubernetes.io/backend-protocol: HTTPS
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    # Replace with your actual ACM Certificate ARN from AWS Console
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:889501007925:certificate/your-cert-id
spec:
  rules:
    - host: argocd.rohandevops.co.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 443