apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: online-boutique
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Production Governance for Online Boutique Microservices"

  # CEO Note: Restrict sources to your specific repository for security
  sourceRepos:
    - "https://github.com/rohandeb2/11-microservices-webapp-2.git"

  # Senior DevOps Fix: Restrict deployment ONLY to the boutique-app namespace
  destinations:
    - namespace: boutique-app
      server: https://kubernetes.default.svc
      name: in-cluster

  # Monitoring: Enable resource monitoring within the ArgoCD UI
  orphanedResources:
    warn: true

  # Security: Whitelist only necessary resource types to prevent privilege escalation
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  # Destination ServiceAccount: Ensures ArgoCD uses the correct identity for sync
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'

  # Role Definitions: Standard production-grade RBAC for the project
  roles:
    - name: boutique-admin
      description: Read-write privileges for the Boutique team
      policies:
        - p, proj:online-boutique:boutique-admin, applications, get, online-boutique/*, allow
        - p, proj:online-boutique:boutique-admin, applications, sync, online-boutique/*, allow