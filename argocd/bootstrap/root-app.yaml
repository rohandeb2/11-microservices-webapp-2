apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique-root
  namespace: argocd
  # CEO Note: Finalizer ensures that deleting this root app safely 
  # cleans up all 11 microservices as well.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Senior DevOps Fix: Use the dedicated project we created for governance
  project: online-boutique
  
  source:
    repoURL: https://github.com/rohandeb2/11-microservices-webapp-2.git
    targetRevision: HEAD
    # Point this to the folder containing your child application manifests
    path: argocd/apps
    
    # Optional: If you want to use Helm to generate your apps dynamically
    # directory:
    #   recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true      # Automatically delete apps removed from Git
      selfHeal: true   # Revert manual changes made via kubectl
    syncOptions:
      # - CreateNamespace=true
      # - ApplyOutOfSyncOnly=true # Improves performance for 11+ services
      - SkipDryRunOnMissingResource=true # Critical for Fargate stability
      
    # Production Grade: Exponential backoff for Fargate provisioning
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m