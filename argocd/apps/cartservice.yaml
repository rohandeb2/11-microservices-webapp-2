apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cartservice
  namespace: argocd
  # CEO Note: The finalizer ensures clean infrastructure by deleting 
  # K8s resources if the app is removed from GitOps.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Senior DevOps Fix: Align with the production project governance
  project: online-boutique

  source:
    repoURL: https://github.com/rohandeb2/11-microservices-webapp-2.git
    targetRevision: HEAD
    path: k8s-boutique-chart
    
    helm:
      # Inject service-specific values from your env-values folder
      valueFiles:
        - env-values/cart-service.yaml
      
      # 12 LPA Standard: Parameter overrides for dynamic versioning
      parameters:
        - name: serviceName
          value: adservice
        - name: image.tag
          value: latest # Consistently using v2 to avoid ECR immutability issues

  destination:
    server: https://kubernetes.default.svc
    namespace: boutique-app

  syncPolicy:
    automated:
      prune: true      # Deletes resources from K8s if they are removed from Git
      selfHeal: true   # Corrects manual kubectl edits to match the Git "Truth"
    syncOptions:
      # - CreateNamespace=true
      # - ApplyOutOfSyncOnly=true
        - SkipDryRunOnMissingResource=true
    
    # Critical for Fargate: Exponential backoff handles slow node startups
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m