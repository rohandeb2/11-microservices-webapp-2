apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: checkoutservice
  namespace: argocd
  # CEO Note: Essential for clean infrastructure teardowns.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Senior DevOps Fix: Align with the 'online-boutique' project governance
  project: online-boutique

  source:
    repoURL: https://github.com/rohandeb2/11-microservices-webapp-2.git
    targetRevision: HEAD
    path: k8s-boutique-chart
    
    helm:
      # Inject service-specific overrides
      valueFiles:
        - ../env-values/checkoutservice.yaml
      
      # 12 LPA Standard: Force production-grade identifiers
      parameters:
        - name: "serviceName"
          value: "checkoutservice"
        - name: "imageTag"
          value: "v2" # Using the fixed build to ensure Go binary paths are correct

  destination:
    server: https://kubernetes.default.svc
    namespace: boutique-app

  syncPolicy:
    automated:
      prune: true      # Removes resources from K8s if deleted from Git
      selfHeal: true   # Reverts manual 'kubectl' edits to maintain Git Truth
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true # Ensures new pods are healthy before deleting old ones
    
    # Critical for EKS Fargate: Handles slow compute provisioning
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  # Senior DevOps Addition: Ignore certain live fields that change at runtime
  # to prevent the app from constantly appearing 'Out of Sync'
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas # Allows HPA to manage scaling without ArgoCD fighting it