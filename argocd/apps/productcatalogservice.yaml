apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: productcatalogservice
  namespace: argocd
  # CEO Note: Essential for automated cleanup of cluster resources
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # Senior DevOps Fix: Align with the established project governance
  project: online-boutique

  source:
    repoURL: https://github.com/rohandeb2/11-microservices-webapp-2.git
    targetRevision: HEAD
    path: k8s-boutique-chart
    
    helm:
      # Inject service-specific overrides from your environment folder
      valueFiles:
        - env-values/productcatalogservice.yaml
      
      # 12 LPA Standard: Explicit parameter mapping
      parameters:
        - name: serviceName
          value: adservice
        - name: image.tag
          value: latest # Using the fixed build to ensure Go binary paths are correct

  destination:
    server: https://kubernetes.default.svc
    namespace: boutique-app

  syncPolicy:
    automated:
      prune: true      # Automatically removes old resources
      selfHeal: true   # Corrects manual configuration drift automatically
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    
    # Critical for Fargate: Exponential backoff for stable provisioning
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m

  # Senior DevOps Addition: Ignore live fields modified by Kubernetes controllers
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt