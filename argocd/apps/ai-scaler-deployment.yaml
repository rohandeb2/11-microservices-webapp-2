apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-predictive-scaler
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-predictive-scaler
  template:
    metadata:
      labels:
        app: ai-predictive-scaler
    spec:
      serviceAccountName: ai-scaler-sa # Links to the RBAC above
      containers:
      - name: scaler
        image: your-docker-repo/ai-predictive-scaler:latest
        env:
          - name: AI_LOG_ANALYZER_KEY
            valueFrom:
              secretKeyRef:
                name: ai-log-analyzer-secret
                key: AI_LOG_ANALYZER_KEY
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"