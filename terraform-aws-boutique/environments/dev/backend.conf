# --- environments/dev/backend.conf ---

# The S3 bucket where the state file will be stored
# Industry Standard: This bucket should have Versioning and Encryption enabled
bucket = "rohan-terraform-state-dev"

# The path within the bucket to the state file
# Using a clear path like 'dev/' helps organize multi-environment states
key = "dev/terraform.tfstate"

# The AWS region where the bucket and DynamoDB table reside
region = "ap-south-1"

# DynamoDB table used for State Locking
# Prevents two engineers from running 'apply' simultaneously and corrupting state
dynamodb_table = "terraform-lock-dev"

# Ensures the state file is encrypted at rest in S3
encrypt = true