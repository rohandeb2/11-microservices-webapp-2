{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "k8s-boutique-chart.fullname" . }}
  labels:
    {{- include "k8s-boutique-chart.labels" . | nindent 4 }}
  annotations:
    # --- AWS ALB Specific Annotations ---
    # Tells EKS to create an Application Load Balancer
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # --- SSL/TLS Configuration (Using your ACM Cert) ---
    # Replace the ARN below with your actual ACM ARN from Terraform output
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.annotations.certificateArn | default "arn:aws:acm:ap-south-1:889501007925:certificate/placeholder" }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # Custom annotations from your values.yaml
    {{- with .Values.ingress.annotations }}
    {{- range $key, $value := . }}
    {{- if ne $key "certificateArn" }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
    {{- end }}
    {{- end }}
spec:
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                # Direct traffic specifically to the frontend service
                name: frontend
                port:
                  number: 80
          {{- end }}
    {{- end }}
{{- end }}