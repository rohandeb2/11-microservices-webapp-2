# Check if ingress is enabled in values.yaml
# If ingress.enabled = false → this Ingress resource will not be created
{{- if .Values.ingress.enabled -}}

# Kubernetes API version for Ingress resource
apiVersion: networking.k8s.io/v1

# This resource exposes services outside the cluster
kind: Ingress

metadata:
  # Generates a full name using a Helm helper template
  # Usually something like: boutique-frontend
  name: {{ include "k8s-boutique-chart.fullname" . }}

  labels:
    # Loads standard labels from Helm helper template
    {{- include "k8s-boutique-chart.labels" . | nindent 4 }}

  annotations:

    # --- AWS ALB Specific Annotations ---

    # Defines ALB as internet-facing (public load balancer)
    alb.ingress.kubernetes.io/scheme: internet-facing

    # ALB will route traffic directly to pod IPs instead of node ports
    alb.ingress.kubernetes.io/target-type: ip

    # All microservices using this group name share the same ALB
    # This reduces cost and creates a single entry point
    alb.ingress.kubernetes.io/group.name: "boutique-group"

    # --- SSL/TLS Configuration (Using AWS ACM Certificate) ---

    # ARN of AWS ACM certificate used for HTTPS
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.annotations.certificateArn | default "arn:aws:acm:ap-south-1:889501007925:certificate/placeholder" }}

    # Defines ALB listeners for HTTP (80) and HTTPS (443)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'

    # Automatically redirect HTTP traffic to HTTPS
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # Additional custom annotations defined in values.yaml
    {{- with .Values.ingress.annotations }}

    # Loop through all annotations defined in values.yaml
    {{- range $key, $value := . }}

    # Skip certificateArn and ingress.class because they are handled separately
    {{- if and (ne $key "certificateArn") (ne $key "kubernetes.io/ingress.class") }}

    # Add annotation key-value pair to the Ingress
    {{ $key }}: {{ $value | quote }}

    {{- end }}
    {{- end }}
    {{- end }}

spec:

  # Defines which Ingress controller should manage this resource
  # In this case AWS Load Balancer Controller
  ingressClassName: alb

  rules:

    # Loop through all hosts defined in values.yaml
    {{- range .Values.ingress.hosts }}

    - host: {{ .host | quote }}

      http:
        paths:

          # Loop through paths defined under each host
          {{- range .paths }}

          - path: {{ .path }}

            # Prefix means traffic starting with this path will match
            pathType: {{ .pathType | default "Prefix" }}

            backend:
              service:

                # Kubernetes service that receives the traffic
                name: {{ .Values.serviceName }}

                port:
                  # Service port that receives traffic
                  number: 80

          {{- end }}
    {{- end }}

# End of ingress condition
{{- end }}