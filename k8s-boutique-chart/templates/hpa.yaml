# Check if autoscaling is enabled in values.yaml
# If autoscaling.enabled = false or not defined → HPA will not be created
{{- if .Values.autoscaling.enabled -}}

# API version used for Horizontal Pod Autoscaler
apiVersion: autoscaling/v2

# This resource automatically increases or decreases pods
kind: HorizontalPodAutoscaler

metadata:
  # Name of the HPA (usually same as the deployment)
  name: {{ .Values.serviceName }}

  labels:
    # Label to identify application name
    app.kubernetes.io/name: {{ .Values.serviceName }}

    # Helm release name (example: boutique-prod)
    app.kubernetes.io/instance: {{ .Release.Name }}

    # Shows that Helm manages this resource
    app.kubernetes.io/managed-by: Helm

spec:

  # This tells HPA which resource it should scale
  scaleTargetRef:

    # API version of the resource we are scaling
    apiVersion: apps/v1

    # Resource type we want to scale
    kind: Deployment

    # Name of the deployment to scale
    name: {{ .Values.serviceName }}

  # Minimum number of pods allowed
  # If not defined → default = 2
  minReplicas: {{ .Values.autoscaling.minReplicas | default 2 }}

  # Maximum number of pods allowed
  # HPA will never scale above this value
  maxReplicas: {{ .Values.autoscaling.maxReplicas | default 10 }}

  metrics:

    # First scaling metric based on CPU usage
    - type: Resource
      resource:

        # Resource type we are monitoring
        name: cpu

        target:
          # Target type = utilization percentage
          type: Utilization

          # If average CPU usage across pods reaches this value
          # HPA will scale the deployment
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage | default 70 }}

    # Second scaling metric based on Memory usage
    - type: Resource
      resource:

        # Resource being monitored
        name: memory

        target:
          # Target type = utilization percentage
          type: Utilization

          # If average memory usage reaches this percentage
          # HPA will scale the deployment
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage | default 80 }}

  behavior:

    # Controls how quickly pods scale UP
    # Helps prevent sudden scaling spikes
    scaleUp:

      # Wait this many seconds before allowing another scale-up event
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleUpStabilizationWindow | default 60 }}

      policies:
        - type: Percent

          # Maximum percentage of pods that can be added at once
          value: {{ .Values.autoscaling.scaleUpPolicyPercent | default 50 }}

          # Time window for the scaling policy
          periodSeconds: 60

    # Controls how quickly pods scale DOWN
    # Prevents removing pods too quickly
    scaleDown:

      # Wait this long before reducing pods again
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleDownStabilizationWindow | default 300 }}

      policies:
        - type: Percent

          # Maximum percentage of pods that can be removed at once
          value: {{ .Values.autoscaling.scaleDownPolicyPercent | default 10 }}

          # Time window for scaling policy
          periodSeconds: 60

# End of autoscaling condition
# If autoscaling.enabled = false → this entire file will not run
{{- end }}