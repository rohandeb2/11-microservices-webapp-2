apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceName }}
  labels:
    # Standard labels to match the Deployment for easier observability
    app.kubernetes.io/name: {{ .Values.serviceName }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: microservice
    app.kubernetes.io/managed-by: Helm
spec:
  # ClusterIP is the standard for internal microservice communication
  type: {{ .Values.serviceType | default "ClusterIP" }}
  
  selector:
    # This MUST match the selector in your deployment.yaml
    app.kubernetes.io/name: {{ .Values.serviceName }}
  
  ports:
  - name: grpc-or-http
    # The port other services will use to talk to this one (e.g., adservice:80)
    port: {{ .Values.servicePort | default 80 }}
    # The actual port the application is listening on inside the container
    targetPort: {{ .Values.containerPort }}
    protocol: TCP