# --- Global Settings ---
# These are shared across all 11 microservices
global:
  accountId: "889501007925"  # Your AWS Account ID for ECR
  region: "ap-south-1"       # Your production region

# --- Default Service Settings ---
# These values are used if a specific service file doesn't override them
serviceName: "base-service"
replicaCount: 2
imageTag: "latest"

# --- Infrastructure Defaults ---
serviceType: ClusterIP
servicePort: 80

# --- Default Resource Requests (Fargate Optimized) ---
# Prevents pods from being scheduled without enough resources
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# --- Security Baseline ---
# Standard hardening for EKS production workloads
serviceAccount:
  create: false
  # Force this name so SecretStore can find it
  name: "boutique-admin-sa" 
  annotations:
    # Ensure this IAM Role has SecretsManager access
    eks.amazonaws.com/role-arn: "arn:aws:iam::889501007925:role/boutique-app-microservice-role"
# --- Default Autoscaling Logic ---
# Logic for your hpa.yaml template
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  # Professional stabilization to prevent "flapping"
  scaleUpStabilizationWindow: 60
  scaleDownStabilizationWindow: 300

# --- Empty Placeholders ---
# These are populated by your env-values/ files
configData: {}
env: []
# Add this block at the bottom
service:
  port: 80
# --- Ingress & SSL Configuration (AWS ALB) ---
ingress:
  enabled: true
  # Professional Tip: The ALB Controller uses these to build your Load Balancer
  annotations:
    # PASTE YOUR ACTUAL ACM ARN HERE FROM TERRAFORM
    certificateArn: "arn:aws:acm:ap-south-1:889501007925:certificate/514bba37-d6cc-4b73-9216-3853f8ea50e0"
  hosts:
    - host: "boutique.yourdomain.com" # Replace with your Route53 domain
      paths:
        - path: /
          pathType: Prefix
containerPort: 8080
# Fix for the NOTES.txt nil pointer error
httpRoute:
  enabled: false