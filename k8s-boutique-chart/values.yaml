# -----------------------------
# Global settings (used across services)
# -----------------------------
global:
  accountId: "123456789012"          # change this to your actual AWS Account ID
  region: "ap-south-1"               # AWS Region

# -----------------------------
# Service Information
# -----------------------------
serviceName: frontend                # Name of the microservice
replicaCount: 2                      # Number of pods

# -----------------------------
# Container Image
# -----------------------------
imageTag: "latest"

# -----------------------------
# Container Port
# -----------------------------
containerPort: 8080                  # Port application runs on inside container

# -----------------------------
# Kubernetes Service
# -----------------------------
serviceType: ClusterIP               # ClusterIP | NodePort | LoadBalancer
servicePort: 80                      # Port exposed inside cluster

# -----------------------------
# Service Account
# -----------------------------
serviceAccount:
  name: boutique-admin-sa

# serviceAccount:
#   create: false
#   # Force this name so SecretStore can find it
#   name: "boutique-admin-sa" 
#   annotations:
#     # Ensure this IAM Role has SecretsManager access
#     eks.amazonaws.com/role-arn: "serviceAccount.annotations.eks.amazonaws.com/role-arn"

# -----------------------------
# ConfigMap Environment Variables
# These will automatically load using envFrom
# -----------------------------
configData:
  APP_ENV: production
  LOG_LEVEL: info
  FEATURE_FLAG: "true"

# -----------------------------
# Additional Environment Variables
# (optional manual variables)
# -----------------------------
env:
  - name: JAVA_OPTS
    value: "-Xms256m -Xmx512m"

# -----------------------------
# Resource Limits
# -----------------------------
resources:
  requests: 
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# -----------------------------
# Horizontal Pod Autoscaler
# -----------------------------
autoscaling:
  enabled: true

  minReplicas: 2
  maxReplicas: 10

  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

  scaleUpStabilizationWindow: 60
  scaleDownStabilizationWindow: 300

  scaleUpPolicyPercent: 50
  scaleDownPolicyPercent: 10

# -----------------------------
# Ingress Configuration (AWS ALB)
# -----------------------------
ingress:
  enabled: true

  hosts:
    - host: boutique.rohandevops.co.in
      paths:
        - path: /
          pathType: Prefix

  annotations:
    certificateArn: "arn:aws:acm:ap-south-1:123456789012:certificate/abcd1234" #change this to your actual ACM ARN

httpRoute:
  enabled: false


