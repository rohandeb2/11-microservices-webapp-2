# --- Service Identity & Networking ---
serviceName: "paymentservice"
containerPort: 50051
servicePort: 80
replicaCount: 2  # Essential for redundancy during the transaction phase

# --- Application Configuration ---
configData:
  PORT: "50051"
  # Production hardening: Disable debugging overhead
  DISABLE_PROFILER: "1"

# --- Resource Management ---
# Node.js requires a stable heap; 128Mi/256Mi is the production baseline
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# --- Production Scaling Logic ---
# Payment is a sensitive step; we scale based on memory to prevent slowdowns
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# --- Security & Identity ---
serviceAccount:
  create: false
  name: "boutique-admin-sa"
  automountToken: false

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10