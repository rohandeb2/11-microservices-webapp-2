# --- Service Identity & Networking ---
serviceName: "currencyservice"
containerPort: 7000
servicePort: 80
replicaCount: 2

# --- Application Configuration ---
configData:
  PORT: "7000"
  # Disabling profiler for production to save CPU cycles
  DISABLE_PROFILER: "1"

# --- Resource Management ---
# Node.js (V8) can be memory intensive; these limits prevent "Heap Out of Memory" crashes
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# --- Production Scaling Logic ---
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# --- Security & Identity ---
serviceAccount:
  create: false
  name: "boutique-admin-sa"
  automountToken: false

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  