# --- Service Identity & Networking ---
serviceName: "loadgenerator"
containerPort: 8080
# Note: Loadgenerator is an internal tool; usually doesn't need a Service object
# but we keep it for consistency in our Helm chart logic.
replicaCount: 1 

# --- Application Configuration ---
configData:
  # The most important variable: Pointing to your Frontend Load Balancer
  FRONTEND_ADDR: "frontend:80"
  # Users to simulate (Professional baseline for testing)
  USERS: "10"

# --- Resource Management ---
# Locust (the tool inside) can be CPU intensive when simulating many users
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# --- Production Scaling Logic ---
# We generally DO NOT autoscale the load generator. 
# We want a controlled amount of load to test the OTHER services.
autoscaling:
  enabled: false

# --- Security & Identity ---
serviceAccount:
  create: false
  name: "boutique-admin-sa"
  automountToken: false

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10