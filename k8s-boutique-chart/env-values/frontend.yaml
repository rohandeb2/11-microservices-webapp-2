# --- Service Identity & Networking ---
serviceName: "frontend"
containerPort: 8080
servicePort: 80
replicaCount: 3  # Higher availability for the user-facing service

# --- Application Configuration ---
# The frontend needs to know where EVERY other service lives
configData:
  PORT: "8080"
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:80"
  CURRENCY_SERVICE_ADDR: "currencyservice:80"
  CART_SERVICE_ADDR: "cartservice:80"
  RECOMMENDATION_SERVICE_ADDR: "recommendationservice:80"
  SHIPPING_SERVICE_ADDR: "shippingservice:80"
  CHECKOUT_SERVICE_ADDR: "checkoutservice:80"
  AD_SERVICE_ADDR: "adservice:80"
  ENV_PLATFORM: "aws-eks"
  # This matches the CloudFront setup from your Terraform
  ENABLE_PROFILER: "0"

# --- Resource Management ---
# Frontend handles the most concurrent connections; needs more CPU than AdService
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# --- Production Scaling Logic ---
# Frontend should scale aggressively to maintain low latency for users
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 65  # Scale earlier to keep UI snappy
  targetMemoryUtilizationPercentage: 80
  scaleUpStabilizationWindow: 0       # Scale up instantly on traffic spikes
  scaleDownStabilizationWindow: 300   # Wait 5 mins before removing pods

# --- Security & Identity ---
serviceAccount:
  create: false
  name: "boutique-admin-sa"
  automountToken: false

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10