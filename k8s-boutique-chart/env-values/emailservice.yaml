# --- Service Identity & Networking ---
serviceName: "emailservice"
containerPort: 8080
servicePort: 80
replicaCount: 1  # Leaf service; can start with 1, but autoscaling handles the rest

# --- Application Configuration ---
configData:
  PORT: "8080"
  # Set to 'true' to simulate failure for testing resilience (Pro DevOps move)
  ENABLE_PROFILER: "0"

# --- Resource Management ---
# Python memory management: Requests are higher than Go but lower than Java
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# --- Production Scaling Logic ---
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

# --- Security & Identity ---
serviceAccount:
  create: false
  name: "boutique-admin-sa"
  automountToken: false

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
