# --- Service Identity & Networking ---
serviceName: "recommendationservice"
containerPort: 8080
servicePort: 80
replicaCount: 2  # Keep 2 for performance; the frontend calls this for every product page

# --- Application Configuration ---
configData:
  PORT: "8080"
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:80"
  ENABLE_PROFILER: "0"

# --- Resource Management ---
# Python logic for sorting/filtering requires a bit more RAM than the email service
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi  # Higher limit to handle list processing without OOM errors

# --- Production Scaling Logic ---
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

# --- Security & Identity ---
serviceAccount:
  create: false
  name: "boutique-admin-sa"
  automountToken: false

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 5

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10