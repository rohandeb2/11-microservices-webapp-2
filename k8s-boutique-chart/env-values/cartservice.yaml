# --- Service Identity & Networking ---
serviceName: "cartservice"   # FIXED: Must be cartservice
containerPort: 7070
servicePort: 7070            # FIXED: Align with the .NET runtime
replicaCount: 3

# --- Application Configuration ---
configData:
  PORT: "7070"
  REDIS_ADDR: "redis-cart:6379" # ADDED: Critical for persistent shopping carts
  ENABLE_PROFILER: "0"

# --- Resource Management ---
# Cart service is light (C#/.NET), but needs fast memory for object serialization
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

# --- Production Scaling Logic ---
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

# --- Security & Identity ---
serviceAccount:
  create: false
  name: "boutique-admin-sa"
  automountToken: true  # FIXED: Set to true so it can fetch AWS Secrets

readinessProbe:
  initialDelaySeconds: 15
  periodSeconds: 5

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10