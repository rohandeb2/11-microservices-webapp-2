# --- Service Identity & Networking ---
serviceName: "adservice"  # remove this when running in production; this is just for testing new features in the adservice
containerPort: 9555
servicePort: 80
replicaCount: 2  # High Availability: Minimum 2 pods across different nodes

# --- Application Configuration ---
# AdService uses Java; these variables are standard for the Boutique app
env:
  - name: PORT
    value: "9555"
  - name: DISABLE_STATS
    value: "0"
  - name: DISABLE_TRACING
    value: "0"

# --- Resource Management (Crucial for EKS Fargate) ---
# Java applications are memory-hungry; these limits prevent OOMKilled errors
resources:
  requests:
    cpu: 200m
    memory: 180Mi
  limits:
    cpu: 300m
    memory: 300Mi

# --- Production Scaling Logic ---
# Scale horizontally based on CPU/Memory usage
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  scaleDownStabilizationWindow: 300

# --- Security & Identity ---
serviceAccount:
  create: true
  name: "boutique-admin-sa"
  automountToken: true
  