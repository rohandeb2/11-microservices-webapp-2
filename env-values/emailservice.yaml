# --- Service Identity & Networking ---
serviceName: "emailservice"
containerPort: 8080
servicePort: 80
replicaCount: 1  # Leaf service; can start with 1, but autoscaling handles the rest

# --- Application Configuration ---
configData:
  PORT: "8080"
  # Set to 'true' to simulate failure for testing resilience (Pro DevOps move)
  ENABLE_PROFILER: "0"

# --- Resource Management ---
# Python memory management: Requests are higher than Go but lower than Java
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

# --- Production Scaling Logic ---
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80

# --- Security & Identity ---
serviceAccount:
  create: true
  automountToken: false