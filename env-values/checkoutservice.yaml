# --- Service Identity & Networking ---
serviceName: "checkoutservice"
containerPort: 5050
servicePort: 80
replicaCount: 3  # High Availability: Critical path for revenue

# --- Application Configuration ---
# Checkout service coordinates the entire order process
configData:
  PORT: "5050"
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:80"
  SHIPPING_SERVICE_ADDR: "shippingservice:80"
  PAYMENT_SERVICE_ADDR: "paymentservice:80"
  EMAIL_SERVICE_ADDR: "emailservice:80"
  CURRENCY_SERVICE_ADDR: "currencyservice:80"
  CART_SERVICE_ADDR: "cartservice:80"
  # Optional: Integration with external tracking/analytics
  ENABLE_PROFILER: "0"

# --- Resource Management ---
# Checkout is written in Go; it is very efficient but needs room for concurrency
resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# --- Production Scaling Logic ---
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  scaleUpStabilizationWindow: 0       # Scale up instantly to handle checkout bursts

# --- Security & Identity ---
serviceAccount:
  create: true
  automountToken: false